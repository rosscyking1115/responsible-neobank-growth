# Route C evidence registry (Plan 4 section 5).
# Canonical source for every public numerical/execution claim. Application
# materials are generated FROM this file, never from memory. No README, CV,
# cover letter, dataset card or interview note may promote a claim above its
# recorded level. Validated by tests/evidence/test_registry.py.

release_branch: bigquery-only
baseline_commit: "9716d35"

claims:
  # --- counts ---------------------------------------------------------------
  - claim_id: current-counts-bigquery
    group: counts
    statement: >-
      68 dbt models (34 legacy graph + 34 Route C) and 215 data tests executed
      green on BigQuery on 2026-07-17.
    level: executed-bigquery
    scope: one dated full build on the Plan 3 datasets (europe-west2)
    evidence_paths:
      - artifacts/plan3/current-graph/summary.json
      - artifacts/plan3/current-graph/run_results.json
    measured_on: "2026-07-17"
    commit: "9e7a7b3"
    limitations: >-
      A dated run, not continuous operation; compatibility models are not
      double-counted as new capability.
    surfaces: [README.md, docs/case-study, cv]

  - claim_id: local-suite-counts
    group: counts
    statement: >-
      Full local suite on DuckDB: 494 pytest tests pass, and the dbt build is
      289 green results — 68 models, 217 data tests and 4 unit tests (4
      exposures are no-op).
    level: executed-local
    scope: >-
      uv run pytest -q and uv run dbt build --target dev at the release commit
      (the earlier Plan 2 snapshot recorded 441 pytest / 291 dbt before Plan 4
      added its release-gate tests)
    evidence_paths:
      - artifacts/plan2/local-verification.json
      - artifacts/plan2/verification-summary.md
    measured_on: "2026-07-17"
    commit: "3407b2f"
    limitations: Local DuckDB execution; BigQuery evidence recorded separately.
    surfaces: [README.md, docs/case-study]

  # --- execution ------------------------------------------------------------
  - claim_id: execution-status
    group: execution
    statement: >-
      The event-to-interface warehouse runs locally on DuckDB and executed on
      BigQuery under a preflight-approved, capped budget; BigQuery execution is
      a dated benchmark run, not production operation.
    level: executed-bigquery
    scope: Plan 2 local platform + Plan 3 benchmark run
    evidence_paths:
      - artifacts/plan3/run-record.md
      - docs/adr/ADR-route-c-plan3-decision.md
    measured_on: "2026-07-17"
    commit: "9716d35"
    limitations: No production, real-customer or continuous-operation claim.
    surfaces: [README.md, docs/case-study, cv, cover-letter]

  # --- generation -------------------------------------------------------------
  - claim_id: deterministic-standard-profile
    group: generation
    statement: >-
      The standard profile generates 568,789 deliveries in 356 daily batches
      (312.6 MB) deterministically: two independent runs produced identical
      logical checksums.
    level: executed-local
    scope: seeded generator with virtual clock and injected faults
    evidence_paths:
      - cloud/gcp/plan3/spend-preflight.md
      - artifacts/plan3/phase-manifest.json
    measured_on: "2026-07-17"
    commit: "36f29f3"
    limitations: >-
      Volumes and rates are engineered for oracle coverage, not calibrated to
      any real bank; ~569k deliveries, not the 1M design target.
    surfaces: [README.md, docs/case-study, dataset-card]

  # --- parity -----------------------------------------------------------------
  - claim_id: full-incremental-parity
    group: parity
    statement: >-
      Full-refresh and incremental lineages reached exact parity (row counts,
      content fingerprints, integer financial totals) at all six governed
      interfaces on BigQuery at base, delta and repair phases.
    level: executed-bigquery
    scope: 569k-delivery benchmark, pre-registered 90/9/1 phases
    evidence_paths:
      - artifacts/plan3/base-parity.json
      - artifacts/plan3/delta-parity.json
      - artifacts/plan3/repair-parity.json
    measured_on: "2026-07-17"
    commit: "fb9cadd"
    limitations: Parity at this benchmark's scale and schema; no universal claim.
    surfaces: [README.md, docs/case-study, cv]

  # --- backfill ---------------------------------------------------------------
  - claim_id: late-event-recovery
    group: backfill
    statement: >-
      A held-back busy day (7,492 deliveries) was demonstrably missed by the
      ordinary 3-day lookback and recovered exactly by a bounded, recorded
      backfill; the at-scale run exposed and fixed two staleness defects
      (unresolved references, stale ledger lines) with self-healing
      re-selection and new invariants.
    level: executed-bigquery
    scope: repair phase of the Plan 3 benchmark
    evidence_paths:
      - artifacts/plan3/repair-pre-backfill-parity.json
      - artifacts/plan3/run-record.md
    measured_on: "2026-07-17"
    commit: "fb9cadd"
    limitations: >-
      Demonstration on synthetic events; the defect class (out-of-order
      reference resolution) is real, the data is not.
    surfaces: [README.md, docs/case-study, interview]

  # --- reconciliation ---------------------------------------------------------
  - claim_id: reward-reconciliation-truth
    group: reconciliation
    statement: >-
      The referral-reward subledger reconciles exactly against generated truth:
      debits equal credits, opening plus movements equals closing, and every
      injected exception is detected with its reason code.
    level: executed-bigquery
    scope: bounded three-account subledger over the benchmark events
    evidence_paths:
      - tests/oracles/test_reward_reconciliation_execution.py
      - dbt_neobank/tests/logical/assert_ledger_debits_equal_credits.sql
      - artifacts/plan3/repair-parity.json
    measured_on: "2026-07-17"
    commit: "fb9cadd"
    limitations: >-
      Illustrative double-entry treatment over fictional accounts; not any real
      bank's accounting policy and not a general ledger.
    surfaces: [README.md, docs/case-study, interview]

  # --- cost -------------------------------------------------------------------
  - claim_id: benchmark-cost-result
    group: cost
    statement: >-
      On the 569k-delivery benchmark (3 repetitions, byte-identical scans per
      strategy), incremental processing billed 1.483 GB versus 1.454 GB for a
      full rebuild (+1.95%) while using 62.7% less compute (median slot-ms
      765,826 vs 2,172,197); the identical 7-day reconciliation query processed
      523.9x fewer bytes on partitioned versus unpartitioned storage.
    level: measured
    scope: delta-phase comparison plus physical-design ablation
    evidence_paths:
      - artifacts/plan3/benchmark-summary.json
      - artifacts/plan3/warehouse-cost-results.csv
    measured_on: "2026-07-17"
    commit: "cf88bb3"
    limitations: >-
      Mixed result reported as measured: byte parity stems from the
      unpartitioned raw store (no pruning); small queries hit the 10 MB
      per-query billing minimum; no extrapolation to production or Monzo scale.
    surfaces: [README.md, docs/case-study, cv, interview]

  - claim_id: benchmark-spend
    group: cost
    statement: >-
      The complete cloud run comprised 844 attributed query jobs billing
      32.99 GB, an estimated £0.21 (likely £0 under the monthly free tier),
      against a £10 preflight-approved ceiling.
    level: measured
    scope: whole Plan 3 run, INFORMATION_SCHEMA.JOBS extraction
    evidence_paths:
      - artifacts/plan3/run-record.md
    measured_on: "2026-07-17"
    commit: "cf88bb3"
    limitations: Estimated at the recorded planning rate; billed-vs-estimated distinction kept.
    surfaces: [docs/case-study]

  # --- looker -----------------------------------------------------------------
  - claim_id: lookml-configured
    group: looker
    statement: >-
      A complete LookML project (model, four Explores, three dashboards, Assert
      tests) is authored against the governed BigQuery interfaces; no Looker
      instance has validated it — the trial signup returned a sales-contact
      outcome with no instance provisioned.
    level: configured
    scope: looker/ directory at the release commit
    evidence_paths:
      - looker/README.md
      - docs/adr/ADR-route-c-plan3-decision.md
    commit: "540fe69"
    limitations: >-
      Claim level is configured, never validated; no Looker experience is
      claimed anywhere; upgrade only via a dated addendum if genuine validation
      happens.
    surfaces: [README.md, docs/case-study, cv]

  # --- adapters ---------------------------------------------------------------
  - claim_id: real-data-adapters
    group: adapters
    statement: >-
      The platform's own fairness/outcome analysis and A/B estimators run on
      two real public datasets (UCI Bank Marketing; Criteo Uplift) as
      method-validation cross-checks.
    level: executed-local
    scope: src/adapters with committed tests
    evidence_paths:
      - docs/REAL_DATA_ADAPTER.md
      - docs/REAL_DATA_CRITEO.md
    commit: "9d680ab"
    limitations: >-
      Criteo is ad-tech with no known ground-truth lift (validates estimator
      behaviour, not recovery); adapters validate methods, not the synthetic
      magnitudes.
    surfaces: [README.md, docs/CREDIBILITY.md]

  # --- cloud-history ----------------------------------------------------------
  - claim_id: cloud-run-historical
    group: cloud-history
    statement: >-
      A private Cloud Run API, scoring/monitoring jobs and scheduler triggers
      were deployed and exercised in an earlier dated run; current cloud
      evidence is the 2026-07-17 benchmark, and the earlier 13-table/107-check
      BigQuery record is historical.
    level: historical
    scope: docs/CLOUD_RUN_DEPLOYMENT.md dated records
    evidence_paths:
      - docs/CLOUD_RUN_DEPLOYMENT.md
      - artifacts/plan3/current-graph/summary.json
    commit: "9d680ab"
    limitations: >-
      Historical status only; the known scheduled-jobs documentation
      contradiction is resolved with dated history in the Task 4 consolidation.
    surfaces: [README.md, docs/GCP_WAREHOUSE.md]

  # --- demo -------------------------------------------------------------------
  - claim_id: live-dashboard
    group: demo
    statement: >-
      A public Streamlit dashboard of the decision-support platform is
      deployed at responsible-neobank-growth.streamlit.app.
    level: external
    scope: Streamlit Community Cloud deployment
    evidence_paths:
      - "https://responsible-neobank-growth.streamlit.app/"
    commit: "3407b2f"
    limitations: >-
      Renamed 2026-07-17 from the old 'appuct' slug (a workaround for
      Streamlit's ban on 'prod' in subdomains) to match the repository;
      availability depends on the free hosting tier and the app may sleep.
    surfaces: [README.md]

  # --- dataset ----------------------------------------------------------------
  - claim_id: dataset-release
    group: dataset
    statement: >-
      The versioned synthetic event benchmark (568,789 + 1,833 deliveries,
      quarantine fixtures, truth manifests, checksums) is published on Hugging
      Face under CC-BY-4.0 and verified from a clean download.
    level: external
    scope: Hugging Face dataset rosscyking/responsible-neobank-growth-events, revision 0111c26e
    evidence_paths:
      - artifacts/plan4/dataset-release.md
      - "https://huggingface.co/datasets/rosscyking/responsible-neobank-growth-events"
    measured_on: "2026-07-17"
    commit: "cdd6bfe"
    limitations: >-
      Synthetic benchmark data, not calibrated to any real population; once on
      the Hub it may be cached or indexed and should be treated as permanent.
    surfaces: [README.md, docs/release, dataset-card]

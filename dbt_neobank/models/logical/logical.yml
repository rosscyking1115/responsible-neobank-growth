version: 2

models:
  - name: lgl_reward_entitlement
    description: >-
      Authoritative entitlement per qualified referral with current
      reconciliation position (Finance-owned meaning; reward_reconciliation
      interface).
    config:
      meta:
        layer: logical
        owner: finance
        classification: synthetic_restricted
        interface_version: 1
        compatibility: backward_compatible
        grain: one row per qualified referral
        unique_key: [referral_id]
        freshness_slo: {warn_after: 24 hours, error_after: 48 hours}
        partition_policy: not applicable at this grain; documented for the BigQuery benchmark
        exposures: [reward_reconciliation_reporting]
        incremental_exemption: >-
          Cross-entity governed interface rebuilt from incremental canonical
          events each run; BigQuery partition replacement is the BigQuery benchmark
          strategy (see docs/contracts/incremental-correctness.md).
    columns:
      - name: referral_id
        tests: [not_null, unique]
      - name: entitled_minor
        tests: [not_null]
      - name: lifecycle_status
        tests:
          - accepted_values:
              arguments:
                values: [qualified, booked, settled, reversed]
      - name: exception_reason
        tests:
          - accepted_values:
              arguments:
                values:
                  - missing_posting
                  - duplicate_posting
                  - amount_mismatch
                  - settlement_without_booking
                  - reversal_beyond_booked_amount

  - name: lgl_reward_ledger_reconciliation
    description: >-
      Daily reward reconciliation over warehouse activity days: cumulative
      positions, ledger balance and append-only exception reason codes.
    config:
      meta:
        layer: logical
        owner: finance
        classification: synthetic_restricted
        interface_version: 1
        compatibility: backward_compatible
        grain: one row per qualified referral per reconciliation day
        unique_key: [referral_id, reconciliation_date]
        freshness_slo: {warn_after: 24 hours, error_after: 48 hours}
        partition_policy: partition by reconciliation_date (daily) intended for BigQuery
        exposures: [reward_reconciliation_reporting, future_bi_dashboards]
        incremental_exemption: >-
          Cross-entity governed interface rebuilt from incremental canonical
          events each run; BigQuery partition replacement is the BigQuery benchmark
          strategy (see docs/contracts/incremental-correctness.md).
    columns:
      - name: referral_id
        tests: [not_null]
      - name: reconciliation_date
        tests: [not_null]
      - name: lifecycle_status
        tests:
          - accepted_values:
              arguments:
                values: [qualified, booked, settled, reversed]
      - name: is_balanced
        tests: [not_null]
      - name: exception_reason
        tests:
          - accepted_values:
              arguments:
                values:
                  - missing_posting
                  - duplicate_posting
                  - amount_mismatch
                  - settlement_without_booking
                  - reversal_beyond_booked_amount
                  - unbalanced_journal
                  - pending_beyond_synthetic_sla

  - name: lgl_growth_acquisition
    description: >-
      Governed growth_acquisition interface: one row per customer application
      journey from application to funded activation with experiment arm and
      synthetic outcome guardrail (Growth owns meaning; platform owns
      reliability).
    config:
      meta:
        layer: logical
        owner: growth
        classification: synthetic_restricted
        interface_version: 1
        compatibility: backward_compatible
        grain: one row per customer application journey
        unique_key: [application_id]
        freshness_slo: {warn_after: 24 hours, error_after: 72 hours}
        partition_policy: partition by application date (daily) intended for BigQuery
        exposures: [streamlit_decision_dashboard, activation_scoring_service, future_bi_dashboards]
        incremental_exemption: >-
          Cross-entity governed interface rebuilt from incremental canonical
          events each run; BigQuery partition replacement is the BigQuery benchmark
          strategy (see docs/contracts/incremental-correctness.md).
    columns:
      - name: application_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: journey_stage
        tests:
          - accepted_values:
              arguments:
                values: [applied, rejected, manual_review, approved, activated, funded]
      - name: experiment_variant
        tests:
          - accepted_values:
              arguments:
                values: [control, treatment]

  - name: lgl_referral_economics
    description: >-
      Governed referral_economics interface: one row per referral with
      qualification, activation outcome and Finance-owned booked reward cost.
      Incrementality estimates come only from governed experiment outputs and
      are null in the ingestion layer.
    config:
      meta:
        layer: logical
        owner: growth
        classification: synthetic_restricted
        interface_version: 1
        compatibility: backward_compatible
        grain: one row per referral
        unique_key: [referral_id]
        freshness_slo: {warn_after: 24 hours, error_after: 72 hours}
        partition_policy: partition by qualification date (daily) intended for BigQuery
        exposures: [reward_reconciliation_reporting, future_bi_dashboards]
        incremental_exemption: >-
          Cross-entity governed interface rebuilt from incremental canonical
          events each run; BigQuery partition replacement is the BigQuery benchmark
          strategy (see docs/contracts/incremental-correctness.md).
    columns:
      - name: referral_id
        tests: [not_null, unique]
      - name: lifecycle_status
        tests:
          - accepted_values:
              arguments:
                values: [invited, qualified, booked, settled, reversed]
      - name: booked_minor
        tests: [not_null]

  - name: lgl_warehouse_health
    description: >-
      Governed warehouse_health interface: one row per governed interface per
      warehouse activity day; local freshness/volume evidence now, BigQuery
      cost fields null until the BigQuery benchmark measures them.
    config:
      meta:
        layer: logical
        owner: platform
        classification: synthetic_restricted
        interface_version: 1
        compatibility: backward_compatible
        grain: one row per governed interface per run day
        unique_key: [model_name, run_date]
        freshness_slo: {warn_after: 2 days, error_after: 7 days}
        partition_policy: partition by run_date (daily) intended for BigQuery
        exposures: [streamlit_decision_dashboard, future_bi_dashboards]
        incremental_exemption: >-
          Cross-entity governed interface rebuilt from incremental canonical
          events each run; BigQuery partition replacement is the BigQuery benchmark
          strategy (see docs/contracts/incremental-correctness.md).
    columns:
      - name: model_name
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [growth_acquisition, referral_economics, reward_reconciliation]
      - name: run_date
        tests: [not_null]
      - name: freshness_status
        tests:
          - accepted_values:
              arguments:
                values: [fresh, warn, error]

unit_tests:
  - name: unit_reconciliation_flags_missing_posting_with_age
    description: A qualified referral with no booking accrues a missing_posting exception.
    model: lgl_reward_ledger_reconciliation
    given:
      - input: ref('lnd_event_deliveries')
        rows:
          - {arrival_date: "2026-01-05"}
          - {arrival_date: "2026-01-07"}
      - input: ref('lgl_reward_entitlement')
        rows:
          - {referral_id: ref_000060, reward_id: null,
             qualified_arrival_date: "2026-01-05", entitled_minor: 5000}
      - input: ref('nrm_reward_event')
        rows: []
      - input: ref('nrm_reward_ledger_entry')
        rows: []
    expect:
      rows:
        - {referral_id: ref_000060, reconciliation_date: "2026-01-05",
           exception_reason: missing_posting, exception_age_days: 0,
           lifecycle_status: qualified, outstanding_payable_minor: 0}
        - {referral_id: ref_000060, reconciliation_date: "2026-01-07",
           exception_reason: missing_posting, exception_age_days: 2,
           lifecycle_status: qualified, outstanding_payable_minor: 0}

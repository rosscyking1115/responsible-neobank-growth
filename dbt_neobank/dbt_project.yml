name: neobank
version: "1.0.0"
config-version: 2

profile: neobank

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

# Job attribution: every BigQuery job carries the dbt
# invocation and node ids as job labels plus a query comment.
query-comment:
  comment: "neobank {{ invocation_id }}"
  job-label: true

models:
  neobank:
    +materialized: table
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
    marts:
      +schema: marts
    landing:
      +schema: landing
      +materialized: view
    normalised:
      +schema: normalised
      +materialized: table
    logical:
      +schema: logical
      +materialized: table
    presentation:
      +schema: presentation
      +materialized: table
    compatibility:
      +schema: compatibility
      +materialized: view

vars:
  # Incremental ingestion lookback (docs/contracts/incremental-correctness.md).
  lookback_days: 3
  # Bounded backfill window (exclusive end); set only via tools/reconcile/backfill.py.
  backfill_start: ""
  backfill_end: ""
  # Expected referral reward entitlement in integer minor units; must match the
  # simulator profile (config/simulator/*.yml reward_amount_minor).
  reward_amount_minor: 5000
  # Synthetic settlement SLA for pending_beyond_synthetic_sla exceptions (days).
  reward_settlement_sla_days: 14

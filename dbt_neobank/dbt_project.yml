name: neobank
version: "1.0.0"
config-version: 2

profile: neobank

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

models:
  neobank:
    +materialized: table
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
    marts:
      +schema: marts
    landing:
      +schema: landing
      +materialized: view
    normalised:
      +schema: normalised
      +materialized: table
    logical:
      +schema: logical
      +materialized: table

vars:
  # Expected referral reward entitlement in integer minor units; must match the
  # simulator profile (config/simulator/*.yml reward_amount_minor).
  reward_amount_minor: 5000
  # Synthetic settlement SLA for pending_beyond_synthetic_sla exceptions (days).
  reward_settlement_sla_days: 14

name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  streamlit-deploy-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Streamlit Cloud dependencies
        run: python -m pip install -r requirements.txt

      - name: Import Streamlit app
        run: python -c "import app.streamlit_app; print('streamlit import ok')"

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Check notebooks
        run: uv run marimo check notebooks --ignore-scripts

      - name: Test
        run: uv run pytest

      - name: Generate synthetic data for dbt
        run: uv run python -m data_generator.generate --users 5000 --months 6 --seed 42 --output-dir raw/ci

      - name: Generate deterministic events twice and compare checksums
        run: |
          uv run python -m src.event_simulator.cli generate --profile tiny --output data/generated/tiny-a
          uv run python -m src.event_simulator.cli generate --profile tiny --output data/generated/tiny-b
          uv run python -m src.event_simulator.cli compare --left data/generated/tiny-a --right data/generated/tiny-b

      - name: Load events with quarantine
        run: uv run python -m src.ingestion.event_loader --source data/generated/tiny-a --warehouse data/warehouse

      - name: dbt build
        run: uv run dbt build --project-dir dbt_neobank --profiles-dir dbt_neobank

      - name: Standards-as-code against the real manifest
        run: uv run python -m tools.standards.check_dbt_interfaces --manifest dbt_neobank/target/manifest.json --json-output artifacts/plan2/standards-report.json

      - name: Blue/green interface reconciliation
        run: uv run python -m tools.reconcile.compare_interfaces --scenario all

      - name: Pipeline-gated tests (oracles, consumer contracts, standards)
        run: uv run pytest tests/oracles tests/migration tests/standards -q

      - name: Upload Route C evidence artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: route-c-plan2-evidence
          path: |
            artifacts/plan2/blue-green-report.json
            artifacts/plan2/standards-report.json
            artifacts/plan2/backfill-log.jsonl
            dbt_neobank/target/run_results.json

      - name: Build API container
        run: docker build -f Dockerfile.api -t neobank-api:ci .

      - name: Smoke test API container
        run: |
          docker run --rm -d -p 8080:8080 --name neobank-api neobank-api:ci
          trap 'docker stop neobank-api' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs neobank-api
          exit 1

      - name: Build Cloud Run jobs container
        run: docker build -f Dockerfile.jobs -t neobank-jobs:ci .

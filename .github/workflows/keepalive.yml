name: keep-streamlit-awake

# Streamlit Community Cloud (free tier) sleeps an app after ~12h of no traffic, so the
# next visitor hits a "wake up" screen + a cold start. This pings each app's health
# endpoint every few hours to keep the container warm for public viewers.
# Best-effort — Streamlit may still recycle the container.
#
# Why two apps? The second app (marketing-effectiveness-lab) is being ARCHIVED, and an
# archived repo cannot run its own scheduled workflows. Its live dashboard still backs the
# MMM<->experiment reconciliation case study absorbed into this repo (see
# docs/case-studies/), so this repo takes over keeping that app warm too.
on:
  schedule:
    - cron: "41 */6 * * *"   # every ~6 hours, off-the-hour on purpose
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake / keep the apps warm
        run: |
          for APP in \
            "https://neobank-product-analytics.streamlit.app" \
            "https://marketing-effectiveness-lab.streamlit.app" ; do
            # Health endpoint returns "ok" when serving; also hit root to trigger a wake.
            curl -fsS --retry 5 --retry-all-errors --max-time 60 "$APP/_stcore/health" || true
            curl -fsS --retry 5 --retry-all-errors --max-time 60 "$APP/" -o /dev/null || true
            echo "pinged $APP"
          done

name: Monitoring Snapshot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEOBANK_DUCKDB_PATH: neobank.duckdb
  RAW_PATH: raw/monitoring
  SNAPSHOT_DATE: "2025-06-30"

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"

jobs:
  monitoring-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate synthetic monitoring data
        run: >
          uv run python -m data_generator.generate
          --users 5000
          --months 6
          --seed 42
          --output-dir "$RAW_PATH"

      - name: Build dbt marts
        run: >
          uv run dbt build
          --project-dir dbt_neobank
          --profiles-dir dbt_neobank
          --vars "{raw_path: $RAW_PATH}"

      - name: Train activation model artifact
        run: >
          uv run python -m src.modelling.run_activation_model
          --db "$NEOBANK_DUCKDB_PATH"
          --output artifacts/monitoring/model_card/MODEL_ACTIVATION_DECISIONING.md

      - name: Generate batch activation scores
        run: >
          uv run python -m src.modelling.batch_score_activation
          --db "$NEOBANK_DUCKDB_PATH"
          --score-date "$SNAPSHOT_DATE"

      - name: Generate product monitoring snapshot
        run: >
          uv run python -m src.monitoring.snapshot
          --db "$NEOBANK_DUCKDB_PATH"
          --snapshot-date "$SNAPSHOT_DATE"

      - name: Generate activation model monitoring report
        run: >
          uv run python -m src.monitoring.model_report
          --report-date "$SNAPSHOT_DATE"

      - name: Upload monitoring artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neobank-monitoring-snapshot
          path: |
            artifacts/monitoring/**
            artifacts/scoring/activation/**
          if-no-files-found: error
